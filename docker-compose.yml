services:
  postgres:
    image: postgres:16-alpine
    container_name: codehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codehub_db
      POSTGRES_USER: codehub
      POSTGRES_PASSWORD: codehub_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codehub -d codehub_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
